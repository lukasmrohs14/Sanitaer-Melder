<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro-Analyse - Voigt Logistik</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .text-firma-green { color: #006959; }
        .bg-firma-green { background-color: #006959; }
        .bg-firma-yellow { background-color: #F4B827; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #006959; border-radius: 10px; }
        .glow-border { border: 2px solid #F4B827; box-shadow: 0 0 15px rgba(244, 184, 39, 0.2); }
    </style>
</head>
<body class="bg-gray-50 p-4 md:p-8 antialiased">

    <div class="max-w-6xl mx-auto space-y-6">
        <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border-b-8 border-firma-yellow fade-in flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <img src="VL_Logo_2022_08176_Voigt_Logistik_CMYK_2022-07-15_AS.png" alt="Logo" class="h-8">
                <div>
                    <h1 class="text-firma-green font-black uppercase tracking-widest text-xl">Management-Analyse</h1>
                    <p class="text-gray-400 text-[10px] font-bold uppercase">Trend-Monitoring & Performance</p>
                </div>
            </div>
            <div class="flex flex-wrap justify-center gap-2">
                <select id="time-filter" onchange="initStats()" class="bg-gray-100 border-none rounded-xl px-3 py-2 text-[10px] font-bold text-gray-600 outline-none">
                    <option value="all">Gesamt</option>
                    <option value="30" selected>Letzte 30 Tage</option>
                    <option value="7">Letzte 7 Tage</option>
                </select>
                <button onclick="exportToCSV()" class="bg-firma-green text-white px-5 py-2 rounded-xl font-bold text-[10px] uppercase shadow-md">Export</button>
                <a href="admin.html" class="bg-gray-800 text-white px-5 py-2 rounded-xl font-bold text-[10px] uppercase shadow-md">Zurück</a>
            </div>
        </div>

        <div id="prediction-banner" class="hidden fade-in bg-white p-5 rounded-[2rem] glow-border flex items-center gap-4">
            <div class="text-2xl">💡</div>
            <p id="prediction-text" class="text-[11px] text-gray-600 font-bold italic"></p>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 fade-in">
            <div class="bg-white p-5 rounded-[2rem] shadow-sm border-l-4 border-firma-green">
                <p class="text-[9px] font-black text-gray-400 uppercase text-center">Meldungen</p>
                <p id="stat-total" class="text-2xl font-black text-firma-green text-center">--</p>
            </div>
            <div class="bg-white p-5 rounded-[2rem] shadow-sm border-l-4 border-firma-yellow">
                <p class="text-[9px] font-black text-gray-400 uppercase text-center">∅ Dauer</p>
                <div class="flex flex-col items-center">
                    <p id="stat-duration" class="text-xl font-black text-firma-green">--</p>
                    <p id="trend-duration" class="text-[8px] font-bold">--</p>
                </div>
            </div>
            <div class="bg-white p-5 rounded-[2rem] shadow-sm border-l-4 border-blue-500">
                <p class="text-[9px] font-black text-gray-400 uppercase text-center">Quote</p>
                <div class="flex flex-col items-center">
                    <p id="stat-ratio" class="text-xl font-black text-firma-green">--</p>
                    <p id="trend-ratio" class="text-[8px] font-bold">--</p>
                </div>
            </div>
            <div class="bg-white p-5 rounded-[2rem] shadow-sm border-l-4 border-red-500">
                <p class="text-[9px] font-black text-gray-400 uppercase text-center">Top Standort</p>
                <p id="stat-top-loc" class="text-xl font-black text-red-600 text-center uppercase">--</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 fade-in">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-lg">
                <h2 class="text-firma-green font-black uppercase text-[11px] mb-4">🕒 Heatmap & Rush-Hour</h2>
                <div class="h-[250px]"><canvas id="hourChart"></canvas></div>
            </div>
            <div class="bg-white p-6 rounded-[2.5rem] shadow-lg">
                <h2 class="text-firma-green font-black uppercase text-[11px] mb-4">📍 Standort-Vergleich (Meldungen)</h2>
                <div class="h-[250px]"><canvas id="locChart"></canvas></div>
            </div>
            <div class="bg-white p-6 rounded-[2.5rem] shadow-lg">
                <h2 class="text-firma-green font-black uppercase text-[11px] mb-4">📅 Wochentag-Muster</h2>
                <div class="h-[250px]"><canvas id="weekdayChart"></canvas></div>
            </div>
            <div class="bg-white p-6 rounded-[2.5rem] shadow-lg">
                <h2 class="text-firma-green font-black uppercase text-[11px] mb-4 text-center">📦 Material-Mix</h2>
                <div class="max-w-[180px] mx-auto"><canvas id="typeChart"></canvas></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://khptivsvjngoicpknecj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtocHRpdnN2am5nb2ljcGtuZWNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDUyMDQsImV4cCI6MjA5MDUyMTIwNH0.dAQK6usd7M-xY0rBwVHVT4ApDgQ93eOD6sa_0rQ53ZE';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let charts = {};

        async function initStats() {
            const days = parseInt(document.getElementById('time-filter').value) || 365;
            const now = new Date();
            const limitDate = new Date(now.setDate(now.getDate() - days));
            const prevLimitDate = new Date(new Date().setDate(new Date().getDate() - (days * 2)));

            let { data: currentData } = await _supabase.from('meldungen').select('*').gte('created_at', limitDate.toISOString());
            let { data: prevData } = await _supabase.from('meldungen').select('*').gte('created_at', prevLimitDate.toISOString()).lt('created_at', limitDate.toISOString());

            processDashboard(currentData || [], prevData || []);
        }

        function processDashboard(curr, prev) {
            // 1. Karten-Metriken & Trends
            const currStats = calcMetrics(curr);
            const prevStats = calcMetrics(prev);
            
            document.getElementById('stat-total').innerText = curr.length;
            
            // Dauer-Trend
            document.getElementById('stat-duration').innerText = currStats.avgDur + " Min";
            renderTrend('trend-duration', currStats.avgDur, prevStats.avgDur, true);

            // Quote-Trend
            document.getElementById('stat-ratio').innerText = currStats.quote + "%";
            renderTrend('trend-ratio', currStats.quote, prevStats.quote, false);

            // Top Standort
            const topLoc = Object.entries(currStats.locs).sort((a,b) => b[1] - a[1])[0];
            document.getElementById('stat-top-loc').innerText = topLoc ? topLoc[0] : "--";

            // 2. Charts vorbereiten
            renderCharts(currStats);
            
            // 3. Prognose
            calculatePrediction(currStats.weekdayPattern);
        }

        function calcMetrics(data) {
            const stats = { avgDur: 0, quote: 0, locs: {}, hours: new Array(24).fill(0), days: new Array(7).fill(0), types: {}, weekdayPattern: {} };
            let totalDur = 0, doneCount = 0;

            data.forEach(m => {
                const date = new Date(m.created_at);
                const h = date.getHours();
                const d = date.getDay();
                
                stats.hours[h]++;
                stats.days[d]++;
                stats.locs[m.standort] = (stats.locs[m.standort] || 0) + 1;
                
                // Cleanup Typen
                let t = m.typ || "Unbekannt";
                stats.types[t] = (stats.types[t] || 0) + 1;

                if (m.status === 'erledigt') {
                    doneCount++;
                    if (m.erledigt_am) {
                        totalDur += (new Date(m.erledigt_am) - date) / 60000;
                    }
                }
            });

            stats.avgDur = doneCount > 0 ? Math.round(totalDur / doneCount) : 0;
            stats.quote = data.length > 0 ? Math.round((doneCount / data.length) * 100) : 0;
            return stats;
        }

        function renderTrend(id, curr, prev, lowerIsBetter) {
            const el = document.getElementById(id);
            if (!prev) { el.innerText = ""; return; }
            const diff = curr - prev;
            const isGood = lowerIsBetter ? diff <= 0 : diff >= 0;
            el.className = `text-[8px] font-black ${isGood ? 'text-emerald-500' : 'text-red-500'}`;
            el.innerText = `${diff > 0 ? '+' : ''}${diff}${lowerIsBetter ? ' Min' : '%'} vs. Vorzeitraum`;
        }

        function renderCharts(s) {
            Object.values(charts).forEach(c => c.destroy());
            const ctxH = document.getElementById('hourChart');
            
            // Heatmap Logik: Stunden mit > 15% der Meldungen hervorheben
            const maxVal = Math.max(...s.hours);
            const rushHours = s.hours.map(v => v > maxVal * 0.7 ? 'rgba(244, 184, 39, 0.2)' : 'rgba(0,0,0,0)');

            charts.hours = new Chart(ctxH, {
                type: 'line',
                data: {
                    labels: Array.from({length: 24}, (_, i) => i + ':00'),
                    datasets: [{
                        label: 'Meldungen', data: s.hours, borderColor: '#006959', backgroundColor: 'rgba(0, 105, 89, 0.1)', fill: true, tension: 0.4
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    plugins: { 
                        autocolors: false,
                        annotation: { annotations: { box1: { type: 'box', xMin: 8, xMax: 12, backgroundColor: 'rgba(244, 184, 39, 0.1)', borderWidth: 0 } } }
                    }
                }
            });

            charts.locs = new Chart(document.getElementById('locChart'), {
                type: 'bar',
                data: { labels: Object.keys(s.locs), datasets: [{ data: Object.values(s.locs), backgroundColor: '#F4B827', borderRadius: 8 }] },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            charts.week = new Chart(document.getElementById('weekdayChart'), {
                type: 'bar',
                data: { labels: ['So','Mo','Di','Mi','Do','Fr','Sa'], datasets: [{ data: s.days, backgroundColor: '#006959', borderRadius: 8 }] },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            charts.types = new Chart(document.getElementById('typeChart'), {
                type: 'doughnut',
                data: { labels: Object.keys(s.types), datasets: [{ data: Object.values(s.types), backgroundColor: ['#006959', '#F4B827', '#10b981', '#3b82f6', '#ef4444'] }] },
                options: { maintainAspectRatio: false }
            });
        }

        function calculatePrediction(pattern) {
            // Einfache Logik für Demo - kann verfeinert werden
            const banner = document.getElementById('prediction-banner');
            banner.classList.remove('hidden');
            document.getElementById('prediction-text').innerText = "Trend-Analyse aktiv: Vormittags (9-11 Uhr) ist das Meldeaufkommen am höchsten. Plane Ressourcen hier fest ein.";
        }

        initStats();
    </script>
</body>
</html>
