<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanitär-Melder</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-firma-green { background-color: #006959; }
        .bg-firma-yellow { background-color: #F4B827; }
        .text-firma-green { color: #006959; }
    </style>
</head>
<body class="bg-gray-50 font-sans p-4">

    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl overflow-hidden mt-6 border-t-8 border-[#006959]">
        <div class="p-6 text-center">
            <img src="VL_Logo_2022_08176_Voigt_Logistik_CMYK_2022-07-15_AS.png
" alt="Firmenlogo" class="mx-auto mb-4 h-12 object-contain">
            <h1 class="text-xl font-extrabold text-gray-800 uppercase tracking-tight">Sanitär-Meldung</h1>
            <p class="text-sm text-gray-500">Helfen Sie uns, alles sauber zu halten.</p>
        </div>
        
        <div class="px-6 pb-6 space-y-3">
            <button onclick="melde('seife')" id="btn-seife" class="w-full p-5 bg-firma-green text-white rounded-xl text-lg font-bold shadow-md active:scale-95 transition-all flex items-center justify-center gap-3">
                <span>🧼</span> Seife leer
            </button>
            <button onclick="melde('klopapier')" id="btn-klopapier" class="w-full p-5 bg-firma-green text-white rounded-xl text-lg font-bold shadow-md active:scale-95 transition-all flex items-center justify-center gap-3">
                <span>🧻</span> Klopapier leer
            </button>
            <button onclick="melde('handtuch')" id="btn-handtuch" class="w-full p-5 bg-firma-green text-white rounded-xl text-lg font-bold shadow-md active:scale-95 transition-all flex items-center justify-center gap-3">
                <span>🖐️</span> Handtücher leer
            </button>
        </div>

        <div class="bg-gray-50 p-6 border-t border-gray-100">
            <h2 class="text-sm font-bold text-firma-green uppercase mb-3 italic">Sonstiges / Defekt melden</h2>
            <textarea id="freitext" class="w-full border-2 border-gray-200 rounded-xl p-3 focus:border-[#F4B827] outline-none transition-colors" rows="3" placeholder="Beschreiben Sie kurz das Problem..."></textarea>
            <button onclick="melde('defekt')" class="w-full bg-firma-yellow hover:bg-[#d9a322] text-white py-4 rounded-xl font-black text-lg mt-3 shadow-lg transition-colors uppercase">
                ⚠️ Meldung absenden
            </button>
        </div>
    </div>

    <div id="danke" class="fixed inset-0 bg-firma-green text-white flex flex-col items-center justify-center hidden z-50 p-6 text-center">
        <div class="text-8xl mb-6 scale-110">✨</div>
        <h1 class="text-4xl font-black mb-4 uppercase">Vielen Dank!</h1>
        <p class="text-xl opacity-90">Wir kümmern uns sofort darum.</p>
    </div>

    <script>
        const SUPABASE_URL = 'https://khptivsvjngoicpknecj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtocHRpdnN2am5nb2ljcGtuZWNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDUyMDQsImV4cCI6MjA5MDUyMTIwNH0.dAQK6usd7M-xY0rBwVHVT4ApDgQ93eOD6sa_0rQ53ZE'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function melde(art) {
            const nachricht = document.getElementById('freitext').value;
            try {
                const { error } = await _supabase.from('meldungen').insert([{ typ: art, nachricht: nachricht, status: 'offen' }]);
                if (error) throw error;
                zeigeDanke();
                document.getElementById('freitext').value = '';
            } catch (err) { alert("Fehler: " + err.message); }
        }

        function zeigeDanke() {
            document.getElementById('danke').classList.remove('hidden');
            setTimeout(() => { 
                document.getElementById('danke').classList.add('hidden'); 
                checkStatus();
            }, 3000);
        }

        async function checkStatus() {
            try {
                const { data } = await _supabase.from('meldungen').select('typ').eq('status', 'offen');
                const types = ['seife', 'klopapier', 'handtuch'];
                const labels = { 'seife': '🧼 Seife leer', 'klopapier': '🧻 Klopapier leer', 'handtuch': '🖐️ Handtücher leer' };

                types.forEach(t => {
                    const btn = document.getElementById('btn-' + t);
                    if (data.some(m => m.typ === t)) {
                        btn.disabled = true;
                        btn.classList.remove('bg-firma-green');
                        btn.classList.add('bg-gray-300', 'cursor-not-allowed', 'shadow-none');
                        btn.innerText = "In Bearbeitung";
                    } else {
                        btn.disabled = false;
                        btn.classList.add('bg-firma-green');
                        btn.classList.remove('bg-gray-300', 'cursor-not-allowed', 'shadow-none');
                        btn.innerText = labels[t];
                    }
                });
            } catch (err) { console.log(err); }
        }

        checkStatus();
        setInterval(checkStatus, 5000);
    </script>
</body>
</html>
