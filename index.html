<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Service-Ruf - Voigt Logistik</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .text-firma-green { color: #006959; }
        .bg-firma-green { background-color: #006959; }
        .bg-firma-yellow { background-color: #F4B827; }
        .border-firma-green { border-color: #006959; }
        * { -webkit-tap-highlight-color: transparent; }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        
        /* Loading Spinner */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #006959;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 flex items-center justify-center min-h-screen p-4 antialiased">

    <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-white/20">
        
        <div class="bg-white p-6 text-center relative border-b border-gray-100">
            <div class="absolute top-0 left-0 w-full h-2 bg-firma-yellow"></div>
            <img src="VL_Logo_2022_08176_Voigt_Logistik_CMYK_2022-07-15_AS.png" alt="Voigt Logistik Logo" class="mx-auto mb-3 h-10 object-contain">
            <h1 class="text-firma-green font-black uppercase tracking-widest text-base">Service-Ruf</h1>
        </div>

        <div id="main-ui" class="p-5 space-y-4">
            
            <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest text-center px-1 font-bold">Schnell-Meldung</p>
            <div class="grid grid-cols-1 gap-3">
                <button onclick="senden('Seife')" class="flex items-center p-5 bg-gray-50 rounded-2xl border-2 border-transparent active:border-firma-green active:bg-white active:scale-[0.97] transition-all group">
                    <span class="text-3xl mr-5">🧼</span>
                    <span class="font-black uppercase text-firma-green text-lg tracking-tight text-left">Seife leer</span>
                </button>

                <button onclick="senden('Klopapier')" class="flex items-center p-5 bg-gray-50 rounded-2xl border-2 border-transparent active:border-firma-green active:bg-white active:scale-[0.97] transition-all group">
                    <span class="text-3xl mr-5">🧻</span>
                    <span class="font-black uppercase text-firma-green text-lg tracking-tight text-left">Klopapier leer</span>
                </button>

                <button onclick="senden('Handtücher')" class="flex items-center p-5 bg-gray-50 rounded-2xl border-2 border-transparent active:border-firma-green active:bg-white active:scale-[0.97] transition-all group">
                    <span class="text-3xl mr-5">🖐️</span>
                    <span class="font-black uppercase text-firma-green text-lg tracking-tight text-left">Handtücher leer</span>
                </button>
            </div>

            <div class="mt-4 pt-4 border-t border-gray-100 space-y-4">
                
                <div class="bg-gray-50 p-4 rounded-2xl border-2 border-gray-100">
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3 px-1 text-center font-bold">Foto hinzufügen (optional)</label>
                    
                    <div class="flex items-center gap-3">
                        <input type="file" id="foto-input" accept="image/*" capture="environment" class="hidden" onchange="vorschauBild(this)">
                        
                        <button onclick="document.getElementById('foto-input').click()" class="bg-gray-200 text-gray-700 p-4 rounded-xl active:scale-95 transition-all text-xl shadow-md">
                            📸
                        </button>
                        
                        <div id="foto-vorschau-container" class="hidden flex items-center gap-2 flex-grow">
                            <img id="foto-vorschau" src="" class="h-14 w-14 object-cover rounded-lg border-2 border-firma-green shadow-md">
                            <button onclick="entferneFoto()" class="text-xs text-red-500 font-bold uppercase p-2 bg-red-50 rounded-lg transition-colors hover:bg-red-100">Löschen</button>
                        </div>
                        <p id="foto-text" class="text-sm text-gray-400 flex-grow font-medium">Tippen Sie auf das Symbol, um ein Foto aufzunehmen</p>
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 px-1 text-center font-bold">Bitte in das Textfeld Sonstige Mitteilung/Defekt schreiben</label>
                    <textarea id="gast-nachricht" placeholder="Geben Sie hier ggf. Details ein..." 
                        class="w-full p-4 bg-firma-green border-2 border-firma-green rounded-2xl text-sm text-white placeholder-green-100/50 outline-none focus:ring-2 focus:ring-firma-yellow transition-all resize-none shadow-inner" rows="3"></textarea>
                </div>

                <button onclick="senden('Sonstiges')" class="w-full bg-firma-green text-white p-4 rounded-2xl font-black uppercase shadow-lg active:scale-[0.97] transition-all tracking-wider text-sm flex items-center justify-center gap-2 group">
                    Senden
                    <span class="text-lg group-active:translate-x-1 transition-transform">➡</span>
                </button>
            </div>
        </div>

        <div id="success-ui" class="hidden p-10 text-center fade-in space-y-4">
            <div id="status-icon" class="inline-flex items-center justify-center w-16 h-16 bg-green-100 rounded-full mb-4">
                <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg>
            </div>
            
            <div id="uploading-ui" class="hidden flex flex-col items-center gap-3">
                <div class="loader"></div>
                <p class="text-firma-green font-bold text-sm">Bild wird hochgeladen...</p>
            </div>

            <div id="done-ui">
                <h2 class="font-black text-xl text-firma-green uppercase mb-2 leading-tight">Vielen Dank!</h2>
                <p class="text-gray-600 font-bold leading-tight">Die Immobilienabteilung wurde informiert.</p>
                
                <div class="mt-8 px-4">
                    <div class="h-1.5 w-full bg-gray-100 rounded-full overflow-hidden">
                        <div id="progress-bar" class="h-full bg-firma-yellow w-0 transition-all duration-[3000ms] ease-linear"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://khptivsvjngoicpknecj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtocHRpdnN2am5nb2ljcGtuZWNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDUyMDQsImV4cCI6MjA5MDUyMTIwNH0.dAQK6usd7M-xY0rBwVHVT4ApDgQ93eOD6sa_0rQ53ZE';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let selectedFile = null;

        // Funktion zur Bild-Vorschau
        function vorschauBild(input) {
            if (input.files && input.files[0]) {
                selectedFile = input.files[0];
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('foto-vorschau').src = e.target.result;
                    document.getElementById('foto-vorschau-container').classList.remove('hidden');
                    document.getElementById('foto-text').classList.add('hidden');
                }
                reader.readAsDataURL(selectedFile);
            }
        }

        // Funktion zum Löschen des ausgewählten Fotos
        function entferneFoto() {
            selectedFile = null;
            document.getElementById('foto-input').value = ''; // Input resetten
            document.getElementById('foto-vorschau-container').classList.add('hidden');
            document.getElementById('foto-text').classList.remove('hidden');
        }

        async function senden(typ) {
            const nachricht = document.getElementById('gast-nachricht').value;
            let fotoUrl = null;

            // UI Wechsel & Lade-Zustand zeigen
            document.getElementById('main-ui').classList.add('hidden');
            document.getElementById('success-ui').classList.remove('hidden');
            
            // Falls ein Foto da ist, Lade-UI zeigen
            if (selectedFile) {
                document.getElementById('status-icon').classList.add('hidden');
                document.getElementById('done-ui').classList.add('hidden');
                document.getElementById('uploading-ui').classList.remove('hidden');
            }

            try {
                // 1. Ggf. Foto hochladen
                if (selectedFile) {
                    const fileName = `${Date.now()}_${selectedFile.name}`;
                    const { data, error: uploadError } = await _supabase.storage
                        .from('reparatur-fotos')
                        .upload(fileName, selectedFile);

                    if (uploadError) throw uploadError;

                    // Öffentliche URL abrufen
                    const { data: publicUrlData } = _supabase.storage
                        .from('reparatur-fotos')
                        .getPublicUrl(fileName);
                    
                    fotoUrl = publicUrlData.publicUrl;
                }

                // Lade-UI verstecken, Erfolgs-UI zeigen
                if (selectedFile) {
                    document.getElementById('status-icon').classList.remove('hidden');
                    document.getElementById('done-ui').classList.remove('hidden');
                    document.getElementById('uploading-ui').classList.add('hidden');
                }

                // Fortschrittsbalken starten
                setTimeout(() => { document.getElementById('progress-bar').style.width = '100%'; }, 50);

                // 2. Senden an Supabase (Speichern in der Spalte 'foto_url'!)
                const insertData = { typ: typ, nachricht: nachricht, status: 'offen' };
                if (fotoUrl) {
                    // Wir speichern die URL in der neuen 'foto_url' Spalte
                    insertData.foto_url = fotoUrl;
                }

                const { error: insertError } = await _supabase
                    .from('meldungen')
                    .insert([insertData]);

                if (insertError) throw insertError;

                // Reset nach 3 Sekunden
                setTimeout(() => {
                    document.getElementById('main-ui').classList.remove('hidden');
                    document.getElementById('success-ui').classList.add('hidden');
                    document.getElementById('progress-bar').style.width = '0%';
                    document.getElementById('gast-nachricht').value = ''; 
                    entferneFoto(); // Foto-Vorschau leeren
                }, 3000);

            } catch (err) {
                console.error("Fehler:", err);
                alert("Fehler beim Senden oder Foto-Upload! Bitte Seite neu laden.");
                location.reload();
            }
        }
    </script>
</body>
</html>
