<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service-Ruf - Voigt Logistik</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-firma-green { background-color: #006959; }
        .bg-firma-yellow { background-color: #F4B827; }
        .text-firma-green { color: #006959; }
        
        /* Sanftes Einblenden der Bestätigung */
        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-white/20">
        
        <div class="bg-firma-green p-10 text-center relative">
            <div class="absolute top-0 left-0 w-full h-2 bg-firma-yellow"></div>
            
            <img src="VL_Logo_2022_08176_Voigt_Logistik_CMYK_2022-07-15_AS.png" alt="Logo" class="mx-auto mb-4 h-14 object-contain">
            <h1 class="text-white font-black uppercase tracking-widest text-xl">Service-Ruf</h1>
            <p class="text-green-100 text-xs font-bold opacity-70 mt-1 uppercase tracking-wider">Sanitär-Management</p>
        </div>

        <div id="main-ui" class="p-8 space-y-4">
            <p class="text-center text-gray-400 font-black uppercase text-[10px] tracking-[0.2em] mb-4">Meldung auswählen</p>
            
            <div class="grid grid-cols-1 gap-4">
                <button onclick="senden('Seife')" class="flex items-center p-5 bg-gray-50 rounded-2xl border-2 border-transparent hover:border-firma-green active:bg-white active:scale-95 transition-all group">
                    <span class="text-3xl mr-5 group-hover:rotate-12 transition-transform">🧼</span>
                    <span class="font-black uppercase text-firma-green text-lg">Seife leer</span>
                </button>

                <button onclick="senden('Klopapier')" class="flex items-center p-5 bg-gray-50 rounded-2xl border-2 border-transparent hover:border-firma-green active:bg-white active:scale-95 transition-all group">
                    <span class="text-3xl mr-5 group-hover:rotate-12 transition-transform">🧻</span>
                    <span class="font-black uppercase text-firma-green text-lg">Klopapier</span>
                </button>

                <button onclick="senden('Handtücher')" class="flex items-center p-5 bg-gray-50 rounded-2xl border-2 border-transparent hover:border-firma-green active:bg-white active:scale-95 transition-all group">
                    <span class="text-3xl mr-5 group-hover:rotate-12 transition-transform">🖐️</span>
                    <span class="font-black uppercase text-firma-green text-lg">Handtücher</span>
                </button>

                <button onclick="senden('Reinigung')" class="flex items-center p-5 bg-red-50/50 rounded-2xl border-2 border-transparent hover:border-red-500 active:bg-white active:scale-95 transition-all group mt-2">
                    <span class="text-3xl mr-5 group-hover:rotate-12 transition-transform">🧹</span>
                    <div class="text-left">
                        <span class="font-black uppercase text-red-600 text-lg block leading-none">Reinigung</span>
                        <span class="text-[9px] font-bold text-red-400 uppercase tracking-tighter">Boden / Waschbecken</span>
                    </div>
                </button>
            </div>
        </div>

        <div id="success-ui" class="hidden p-12 text-center fade-in">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-green-100 rounded-full mb-6">
                <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h2 class="font-black text-2xl text-firma-green uppercase mb-4 leading-tight">Vielen Dank!</h2>
            <p class="text-gray-600 font-bold text-lg leading-snug">Die Immobilienabteilung wurde informiert.</p>
            
            <div class="mt-12">
                <div class="h-1.5 w-full bg-gray-100 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-firma-yellow w-0 transition-all duration-[6000ms] ease-linear"></div>
                </div>
                <p class="text-[9px] text-gray-300 mt-3 font-black uppercase tracking-[0.2em]">Bereit für nächste Eingabe</p>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://khptivsvjngoicpknecj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtocHRpdnN2am5nb2ljcGtuZWNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDUyMDQsImV4cCI6MjA5MDUyMTIwNH0.dAQK6usd7M-xY0rBwVHVT4ApDgQ93eOD6sa_0rQ53ZE';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function senden(typ) {
            // UI Switch
            document.getElementById('main-ui').classList.add('hidden');
            document.getElementById('success-ui').classList.remove('hidden');
            
            // Progressbar Animation starten
            setTimeout(() => {
                document.getElementById('progress-bar').style.width = '100%';
            }, 50);

            try {
                // In Datenbank speichern
                const { error } = await _supabase
                    .from('meldungen')
                    .insert([{ typ: typ, status: 'offen' }]);

                if (error) throw error;

                // Nach 6 Sekunden (genug Zeit zum Lesen) zurücksetzen
                setTimeout(() => {
                    document.getElementById('main-ui').classList.remove('hidden');
                    document.getElementById('success-ui').classList.add('hidden');
                    document.getElementById('progress-bar').style.width = '0%';
                }, 6000);

            } catch (err) {
                console.error("Fehler:", err);
                alert("Verbindung unterbrochen. Bitte Seite neu laden.");
                location.reload();
            }
        }
    </script>
</body>
</html>
