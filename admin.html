<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Sanitär Melder</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold mb-6 text-center">Reinigung-Dashboard</h1>
        
        <div id="login-section" class="bg-slate-800 p-6 rounded-lg shadow-xl">
            <input type="password" id="pin" placeholder="PIN eingeben" class="w-full p-3 bg-slate-700 rounded-lg mb-4 text-center text-xl outline-none">
            <button onclick="checkPin()" class="w-full bg-blue-600 py-3 rounded-lg font-bold">Einloggen</button>
        </div>

        <div id="admin-content" class="hidden space-y-4">
            <div id="liste" class="space-y-3"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://khptivsvjngoicpknecj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtocHRpdnN2am5nb2ljcGtuZWNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDUyMDQsImV4cCI6MjA5MDUyMTIwNH0.dAQK6usd7M-xY0rBwVHVT4ApDgQ93eOD6sa_0rQ53ZE';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function checkPin() {
            if (document.getElementById('pin').value === "1234") {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
                loadMeldungen();
            } else {
                alert("Falsche PIN!");
            }
        }

        async function loadMeldungen() {
            const { data } = await _supabase.from('meldungen').select('*').eq('status', 'offen').order('created_at', { ascending: false });
            const liste = document.getElementById('liste');
            liste.innerHTML = data.length === 0 ? '<p class="text-center text-slate-500 py-10">Alles sauber!</p>' : '';
            data.forEach(m => {
                const div = document.createElement('div');
                div.className = "bg-slate-800 p-4 rounded-lg flex justify-between items-center";
                div.innerHTML = `<div><p class="font-bold uppercase">${m.typ}</p><p class="text-xs text-slate-400">${m.nachricht || ''}</p></div>
                                 <button onclick="erledigen('${m.id}')" class="bg-green-600 px-3 py-1 rounded text-sm font-bold">Erledigt</button>`;
                liste.appendChild(div);
            });
        }

        async function erledigen(id) {
            await _supabase.from('meldungen').update({ status: 'erledigt' }).eq('id', id);
            loadMeldungen();
        }
    </script>
</body>
</html>
