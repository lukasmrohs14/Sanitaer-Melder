<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin-Dashboard - Voigt Logistik</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .text-firma-green { color: #006959; }
        .bg-firma-green { background-color: #006959; }
        .bg-firma-yellow { background-color: #F4B827; }
        .border-firma-green { border-color: #006959; }
        * { -webkit-tap-highlight-color: transparent; }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 flex items-center justify-center min-h-screen p-4 antialiased">

    <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-white/20">
        
        <div class="bg-white p-8 text-center relative border-b border-gray-100">
            <div class="absolute top-0 left-0 w-full h-2 bg-firma-yellow"></div>
            <img src="VL_Logo_2022_08176_Voigt_Logistik_CMYK_2022-07-15_AS.png" 
                 alt="Voigt Logistik Logo" 
                 class="mx-auto mb-4 h-12 object-contain">
            <h1 class="text-firma-green font-black uppercase tracking-widest text-lg">Reinigung-Dashboard</h1>
        </div>

        <div id="login-section" class="p-8 space-y-5 fade-in">
            <p class="text-center text-gray-400 font-black uppercase text-[10px] tracking-[0.2em]">Autorisierung erforderlich</p>
            <input type="password" id="pin" placeholder="PIN eingeben" 
                class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl text-center text-3xl outline-none focus:border-firma-yellow transition-all shadow-inner placeholder:text-gray-300">
            <button onclick="checkPin()" 
                class="w-full bg-firma-yellow text-white p-4 rounded-2xl font-black uppercase shadow-lg active:scale-[0.97] transition-all tracking-wider text-sm">
                Einloggen
            </button>
        </div>

        <div id="admin-content" class="hidden p-6 space-y-6 fade-in">
            <div class="mt-2 pt-4 border-t border-gray-100 text-center">
                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 px-1">Aktuelle Reinigungskraft</label>
                <div class="relative inline-block w-full">
                    <select id="admin-name-select" 
                        class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl text-sm font-bold text-firma-green outline-none focus:border-firma-yellow transition-all cursor-pointer shadow-inner appearance-none text-center uppercase tracking-wider">
                        <option value="Felix">👤 Felix</option>
                        <option value="Birgit">👤 Birgit</option>
                        <option value="Gast-Reinigung">🛠️ Gast-Reinigung</option>
                    </select>
                </div>
            </div>

            <div class="space-y-4">
                <div class="flex justify-between items-center px-1">
                    <h2 class="text-firma-green font-black uppercase tracking-tight text-sm text-left">Offene Aufgaben</h2>
                    <div class="flex gap-2">
                        <a href="stats.html" class="text-[10px] bg-firma-green text-white px-3 py-1.5 rounded-full font-bold hover:bg-opacity-90 uppercase transition-colors flex items-center gap-1">
                            📊 Stats
                        </a>
                        <button onclick="loadMeldungen()" class="text-[10px] bg-gray-100 text-gray-500 px-3 py-1.5 rounded-full font-bold hover:bg-gray-200 uppercase transition-colors flex items-center gap-1">
                            🔄 Refresh
                        </button>
                    </div>
                </div>
                <div id="liste" class="space-y-3">
                    <p class="text-center text-gray-300 py-10 font-bold uppercase text-[10px] tracking-widest">Lade Aufgaben...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://khptivsvjngoicpknecj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtocHRpdnN2am5nb2ljcGtuZWNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDUyMDQsImV4cCI6MjA5MDUyMTIwNH0.dAQK6usd7M-xY0rBwVHVT4ApDgQ93eOD6sa_0rQ53ZE';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Enter-Taste für PIN
        document.getElementById('pin').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPin();
        });

        // PIN Prüfung via RPC
        async function checkPin() {
            const eingabe = document.getElementById('pin').value;
            try {
                const { data: isValid, error } = await _supabase.rpc('check_admin_pin', { input_pin: eingabe });
                if (error) throw error;
                if (isValid) {
                    document.getElementById('login-section').classList.add('hidden');
                    document.getElementById('admin-content').classList.remove('hidden');
                    loadMeldungen();
                    initRealtime();
                } else {
                    alert("Falsche PIN!");
                    document.getElementById('pin').value = '';
                }
            } catch (err) {
                console.error("Login-Fehler:", err);
                alert("Verbindungsfehler.");
            }
        }

        // Echtzeit-Updates für neue Meldungen
        function initRealtime() {
            _supabase
                .channel('admin-updates')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'meldungen' }, () => {
                    loadMeldungen();
                })
                .subscribe();
        }

        // Aufgaben laden (nur Status 'offen')
        async function loadMeldungen() {
            try {
                const { data, error } = await _supabase
                    .from('meldungen')
                    .select('*')
                    .eq('status', 'offen')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                const liste = document.getElementById('liste');
                liste.innerHTML = '';

                if (data.length === 0) {
                    liste.innerHTML = `<div class="bg-gray-50 p-10 rounded-3xl border-2 border-dashed border-gray-200 text-center">
                        <p class="text-gray-300 font-black uppercase text-[10px] tracking-widest">✨ Alles erledigt!</p>
                    </div>`;
                    return;
                }

                data.forEach(m => {
                    const div = document.createElement('div');
                    div.className = "bg-white p-5 rounded-2xl shadow-md border-l-8 border-firma-green flex justify-between items-center transition-all hover:shadow-lg fade-in";
                    
                    // Icon-Logik passend zur Statistik
                    let icon = '⚠️';
                    const rawType = (m.typ || "").toLowerCase();
                    if (rawType.includes("papier")) icon = '🧻';
                    else if (rawType.includes("seife")) icon = '🧼';
                    else if (rawType.includes("handtuch") || rawType.includes("handtücher")) icon = '🖐️';
                    else if (rawType.includes("defekt")) icon = '🛠️';

                    // Foto-Handling
                    let fotoUrl = m.foto_url;
                    if (!fotoUrl && m.nachricht && m.nachricht.includes('[FOTO: ')) {
                        fotoUrl = m.nachricht.split('[FOTO: ')[1].split(']')[0];
                    }

                    const fotoHtml = fotoUrl ? `
                        <a href="${fotoUrl}" target="_blank" class="mt-2 block">
                            <img src="${fotoUrl}" class="h-16 w-full object-cover rounded-xl border border-gray-100 shadow-sm">
                        </a>` : '';
                    
                    div.innerHTML = `
                        <div class="flex-1 pr-4 text-left">
                            <p class="font-black text-firma-green uppercase text-xs flex items-center gap-2">
                                <span class="text-lg">${icon}</span> ${m.typ}
                            </p>
                            <p class="text-[9px] text-gray-400 font-bold mb-1 uppercase tracking-tighter">
                                ${new Date(m.created_at).toLocaleString('de-DE')}
                            </p>
                            ${m.nachricht ? `<p class="text-[11px] text-gray-600 leading-tight italic">"${m.nachricht.replace(/\[FOTO: .*?\]/, '')}"</p>` : ''}
                            ${fotoHtml}
                        </div>
                        <button onclick="erledigen('${m.id}')" 
                            class="bg-firma-yellow text-white px-4 py-3 rounded-xl font-black text-[10px] shadow-md hover:brightness-95 active:scale-90 transition-all uppercase whitespace-nowrap">
                            Erledigt
                        </button>`;
                    liste.appendChild(div);
                });
            } catch (err) { console.error("Ladefehler:", err); }
        }

        // Status-Update mit Zeitstempel für Statistik-Dauer
        async function erledigen(id) {
            const name = document.getElementById('admin-name-select').value;
            try {
                const { error } = await _supabase
                    .from('meldungen')
                    .update({ 
                        status: 'erledigt', 
                        erledigt_von: name, 
                        erledigt_am: new Date().toISOString() // WICHTIG: Erzeugt die Daten für die gelbe Linie
                    })
                    .eq('id', id);
                
                if (error) throw error;
                loadMeldungen();
            } catch (err) { alert("Fehler: " + err.message); }
        }

        // Backup-Refresh alle 30 Sek
        setInterval(() => {
            if (!document.getElementById('admin-content').classList.contains('hidden')) loadMeldungen();
        }, 30000);
    </script>
</body>
</html>
